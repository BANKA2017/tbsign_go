syntax = "proto3";

import "Error.proto";
import "SimpleUser.proto";

option go_package = ".";

message GetPrivateInfoResIdl {
    message ResData {
        int32 location = 1;
        int32 post = 2;
        int32 like = 3;
        int32 group = 4;
        SimpleUser user = 5;
        int32 live = 6;
        int32 forum_num = 7;
        int32 reply = 8;
        int32 bazhu_show_inside = 9;
        int32 bazhu_show_outside = 10;
        int32 follow = 11;
    }

    ResData data = 1;
    Error error = 2;
}
